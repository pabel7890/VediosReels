<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VediosReels - Register</title>
<style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif;}
  body {background: #0a0a0a; color: #fff; min-height: 100vh; position: relative; overflow-x: hidden;}
  .overlay {position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(10,10,10,0.2) 0%, rgba(10,10,10,1) 60%); z-index: 1;}
  .container {position: relative; z-index: 2; padding: 20px; max-width: 450px; margin: 0 auto;}
  .logo {text-align: center; margin: 40px 0 40px;}
  .logo div {width: 80px; height: 80px; margin: 0 auto; border-radius: 50%; background: linear-gradient(135deg, #00ff88, #00ccff, #ff00ff); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: #000;}
  h1 {font-size: 26px; font-weight: 700; margin-bottom: 8px;}
  .subtitle {font-size: 14px; color: #aaa; margin-bottom: 30px;}
  .input-group {background: #1e1e1e; border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px;}
  .input-group input {background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 15px;}
  .input-group input::placeholder {color: #666;}
  .btn-register {width: 100%; padding: 15px; background: #fbbc05; color: #000; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; margin-top: 20px; cursor: pointer;}
  .btn-register:disabled {opacity: 0.6; cursor: not-allowed;}
  .login-link {text-align: center; margin-top: 20px; color: #fbbc05; font-size: 14px; cursor: pointer;}
  .error {color: #ff4444; font-size: 13px; margin-top: -10px; margin-bottom: 10px; display: none;}
  .success {color: #00ff88; font-size: 13px; margin-top: -10px; margin-bottom: 10px; display: none;}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
  <div class="logo"><div>VR</div></div>
  <h1>Welcome to VediosReels!</h1>
  <p class="subtitle">Get started quickly on your exciting journey</p>

  <div class="input-group">
    <span>📧</span>
    <input type="email" id="email" placeholder="Enter your email">
  </div>
  <div class="error" id="emailError"></div>

  <div class="input-group">
    <span>🔒</span>
    <input type="password" id="password" placeholder="Enter your password">
  </div>
  <div class="error" id="passwordError"></div>

  <button class="btn-register" id="registerBtn">Register</button>
  <div class="success" id="successMsg"></div>
  <div class="login-link">Already have an account? Login</div>
</div>
</body>
