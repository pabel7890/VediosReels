<!DOCTYPE html>
<html>
<head>
  <title>Recharge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { 
      font-family: Arial; 
      background: #0a0a0a; 
      color: white; 
      margin: 0; 
      padding: 15px;
    }
    h2 { text-align: center; }
    .method-box {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
    }
    .number {
      font-size: 22px;
      color: #00e676;
      font-weight: bold;
      text-align: center;
      margin: 5px 0 15px 0;
    }
    .nagad { color: #ff9800; }
    input, button { 
      width: 100%; 
      padding: 12px; 
      margin: 8px 0; 
      border: none; 
      border-radius: 8px; 
      box-sizing: border-box;
      font-size: 16px;
    }
    input { background: #333; color: white; }
    button { background: #00c853; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Recharge</h2>
  
  <div class="method-box">
    <h4 style="color:#00c853; margin:0 0 5px 0;">Bkash</h4>
    <div class="number">01748059815</div>
    
    <h4 style="color:#ff5722; margin:15px 0 5px 0;">Nagad</h4>
    <div class="number nagad">018XXXXXXXX</div>
  </div>

  <p>Send Bkash/Nagad to the number above, then enter details below:</p>
  
  <input type="number" placeholder="Amount in USDT">
  <input type="text" placeholder="Transaction ID">
  <button>Submit Request</button>
</body>
</html>
