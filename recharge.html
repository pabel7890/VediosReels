<!DOCTYPE html>
<html>
<head>
  <title>Recharge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { 
      font-family: Arial; 
      background: #0a0a0a; 
      color: white; 
      margin: 0; 
      padding: 15px;
    }
    h2 { text-align: center; margin-bottom: 20px; }
    
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-bkash { background: #00c853; color: white; }
    .btn-nagad { background: #ff5722; color: white; }
    .btn.active { outline: 3px solid white; }
    
    .method-box {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
      display: none;
    }
    .method-box.active { display: block; }
    
    .number {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
    }
    .bkash-num { color: #00e676; }
    .nagad-num { color: #ff9800; }
    
    input, button.submit { 
      width: 100%; 
      padding: 12px; 
      margin: 8px 0; 
      border: none; 
      border-radius: 8px; 
      box-sizing: border-box;
      font-size: 16px;
    }
    input { background: #333; color: white; }
    button.submit { background: #00c853; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Recharge</h2>
  
  <div class="btn-group">
    <button class="btn btn-bkash" onclick="showMethod('bkash')">Bkash</button>
    <button class="btn btn-nagad" onclick="showMethod('nagad')">Nagad</button>
  </div>

  <!-- Bkash Section -->
  <div id="bkash" class="method-box">
    <h4 style="color:#00c853; margin:0 0 5px 0;">Bkash Number</h4>
    <div class="number bkash-num">01748059815</div>
    <p>Send money to this number, then enter details below:</p>
    <input type="number" placeholder="Amount in USDT">
    <input type="text" placeholder="Transaction ID">
    <button class="submit">Submit Request</button>
  </div>

  <!-- Nagad Section -->
  <div id="nagad" class="method-box">
    <h4 style="color:#ff5722; margin:0 0 5px 0;">Nagad Number</h4>
    <div class="number nagad-num">018XXXXXXXX</div>
    <p>Send money to this number, then enter details below:</p>
    <input type="number" placeholder="Amount in USDT">
    <input type="text" placeholder="Transaction ID">
    <button class="submit">Submit Request</button>
  </div>

  <script>
    function showMethod(method) {
      // Hide all
      document.getElementById('bkash').classList.remove('active');
      document.getElementById('nagad').classList.remove('active');
      document.querySelector('.btn-bkash').classList.remove('active');
      document.querySelector('.btn-nagad').classList.remove('active');
      
      // Show selected
      document.getElementById(method).classList.add('active');
      document.querySelector('.btn-' + method).classList.add('active');
    }
  </script>
</body>
</html>
